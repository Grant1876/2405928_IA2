<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="LAB02STYLE.css"/>
  </head>
  <!-- Website Header -->
  <header>
    <h1>GOAT TECH</h1>
    <!-- Navigation menu -->
    <nav>
        <a href="form.html#login">Login</a>
        <a href="form.html#register">Register</a>
        <a href="form1.html#products">Products</a>
        <a href="form1.html#about">About Us</a>
    </nav>
  </header>
  <!-- Login Section -->
  <section id="login">
    <form>
        <h2>LOGIN</h2>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <!-- Form buttons -->
        <button type="submit">Login</button>
        <button type="reset">Clear</button>
    </form>
  </section>
  <!-- Registration Section -->
  <section id="register">
    <form>
        <h2>REGISTER</h2>
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required><br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="user">Username:</label><br>
        <input type="text" id="user" name="user" required><br><br>
        <label for="regcode">Password:</label><br>
        <input type="password" id="regcode" name="regcode" required><br><br>
        <!-- Form buttons -->
        <button type="submit">Register</button>
        <button type="reset">Clear</button>
    </form>
  </section>
